<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yamio — Account</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --panel: #16213e; --gold: #f5a623; --green: #4ecdc4;
    --white: #f1f1f1; --muted: #9fb2e6; --accent: #e94560;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif; color: var(--white); padding: 20px;
    background: radial-gradient(circle at 50% 18%, #1b2b6b 0%, #101a45 45%, #080e2c 100%);
  }
  .card {
    width: min(400px, 94vw); background: var(--panel); border-radius: 22px;
    border: 1px solid rgba(245,166,35,0.25); padding: 28px 24px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.5); text-align: center;
  }
  .logo { width: 76px; height: 76px; border-radius: 18px; margin-bottom: 8px;
    filter: drop-shadow(0 0 18px rgba(245,166,35,0.35)); }
  .brand { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 6px;
    color: var(--gold); margin-bottom: 4px; }
  h1 { font-size: 1.05rem; font-weight: 900; margin: 10px 0 6px; }
  p { font-size: 0.86rem; color: var(--muted); font-weight: 700; line-height: 1.5; margin: 6px 0 14px; }
  .email { color: var(--white); font-weight: 900; }
  input {
    width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 12px; padding: 13px 14px;
    color: var(--white); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem;
  }
  input:focus { outline: none; border-color: var(--gold); }
  button {
    width: 100%; border: none; border-radius: 999px; padding: 13px;
    font-family: 'Nunito', sans-serif; font-weight: 900; letter-spacing: 0.6px;
    cursor: pointer; background: linear-gradient(135deg, var(--green), #2ecc71); color: #111;
    font-size: 0.95rem;
  }
  button:disabled { opacity: 0.55; }
  .play-btn { background: linear-gradient(135deg, var(--gold), #f39c12); color: #251400;
    text-decoration: none; display: block; margin-top: 8px; }
  .status { font-size: 0.85rem; font-weight: 800; margin-top: 12px; min-height: 20px; }
  .status.err { color: var(--accent); }
  .status.ok { color: var(--green); }
  .big { font-size: 2.4rem; margin: 6px 0; }
  .support { margin-top: 20px; font-size: 0.74rem; color: rgba(159,178,230,0.75); font-weight: 700; }
  .support a { color: var(--gold); text-decoration: none; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="icons/icon-192.png" alt="Yamio">
  <div class="brand">YAMIO</div>

  <!-- Checking the link -->
  <div id="viewLoading">
    <div class="big">🎲</div>
    <h1>Checking your link…</h1>
    <p>One moment while we roll the dice.</p>
  </div>

  <!-- Password reset form -->
  <div id="viewReset" class="hidden">
    <h1>Choose a new password</h1>
    <p>for <span class="email" id="resetEmail"></span></p>
    <input type="password" id="pw1" placeholder="New password" autocomplete="new-password">
    <input type="password" id="pw2" placeholder="Confirm new password" autocomplete="new-password">
    <button id="resetBtn">SET NEW PASSWORD</button>
    <div class="status" id="resetStatus"></div>
  </div>

  <!-- Generic success -->
  <div id="viewDone" class="hidden">
    <div class="big" id="doneEmoji">🏆</div>
    <h1 id="doneTitle">All set!</h1>
    <p id="doneText"></p>
    <a class="play-btn" href="/" id="playBtn">PLAY YAMIO</a>
  </div>

  <!-- Error -->
  <div id="viewError" class="hidden">
    <div class="big">🎲</div>
    <h1>This link has expired</h1>
    <p id="errorText">The link is invalid or was already used. Request a fresh one from the game and try again.</p>
    <a class="play-btn" href="/">BACK TO YAMIO</a>
  </div>

  <div class="support">Questions? We're happy to help — <a href="mailto:support@yamio.io">support@yamio.io</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
(function () {
  'use strict';

  function show(id) {
    ['viewLoading', 'viewReset', 'viewDone', 'viewError'].forEach(v =>
      document.getElementById(v).classList.toggle('hidden', v !== id));
  }
  function fail(text) {
    if (text) document.getElementById('errorText').textContent = text;
    show('viewError');
  }

  var params = new URLSearchParams(location.search);
  var mode = params.get('mode');
  var oobCode = params.get('oobCode');

  if (!mode || !oobCode) { fail('This page only works from the links in Yamio account emails.'); return; }

  if (!window.firebase || !firebase.auth) {
    fail('Could not reach the server — check your connection and reopen the link.');
    return;
  }

  firebase.initializeApp({
    apiKey: "AIzaSyBl1XezlXttwyQLBsEJJV0nkxomzL0uhZw",
    authDomain: location.hostname === 'localhost' ? 'yum-game.firebaseapp.com' : location.hostname,
    projectId: "yum-game",
    appId: "1:418931435506:web:1f37261a6bf89c596b2d6b"
  });
  var auth = firebase.auth();

  if (mode === 'resetPassword') {
    auth.verifyPasswordResetCode(oobCode).then(function (email) {
      document.getElementById('resetEmail').textContent = email;
      show('viewReset');
    }).catch(function () {
      fail('This password reset link is invalid or has expired. Use "Forgot password?" in the game to get a new one.');
    });

    document.getElementById('resetBtn').onclick = function () {
      var pw1 = document.getElementById('pw1').value;
      var pw2 = document.getElementById('pw2').value;
      var status = document.getElementById('resetStatus');
      status.className = 'status err';
      if (!pw1 || pw1.length < 6) { status.textContent = 'Password must be at least 6 characters'; return; }
      if (pw1 !== pw2) { status.textContent = 'Passwords don\'t match'; return; }
      var btn = document.getElementById('resetBtn');
      btn.disabled = true;
      auth.confirmPasswordReset(oobCode, pw1).then(function () {
        document.getElementById('doneEmoji').textContent = '🔐';
        document.getElementById('doneTitle').textContent = 'Password updated!';
        document.getElementById('doneText').textContent = 'You can now sign in to Yamio with your new password.';
        show('viewDone');
      }).catch(function (err) {
        btn.disabled = false;
        status.textContent = (err && err.code === 'auth/weak-password')
          ? 'Password too weak — try a longer one'
          : 'Could not update the password — the link may have expired.';
      });
    };

  } else if (mode === 'verifyEmail') {
    auth.applyActionCode(oobCode).then(function () {
      document.getElementById('doneEmoji').textContent = '🎉';
      document.getElementById('doneTitle').textContent = 'Email confirmed!';
      document.getElementById('doneText').textContent = 'Your Yamio account is ready — head back to the game and sign in.';
      show('viewDone');
    }).catch(function () {
      fail('This confirmation link is invalid or has expired. Sign in from the game to get a fresh one.');
    });

  } else if (mode === 'recoverEmail') {
    auth.applyActionCode(oobCode).then(function () {
      document.getElementById('doneEmoji').textContent = '✅';
      document.getElementById('doneTitle').textContent = 'Email restored';
      document.getElementById('doneText').textContent = 'Your previous email address has been restored on your Yamio account.';
      show('viewDone');
    }).catch(function () {
      fail();
    });

  } else {
    fail();
  }
})();
</script>
</body>
</html>
