<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0%" stop-color="#1f1f5a"/>
      <stop offset="60%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#0a1a3a"/>
    </radialGradient>
    <radialGradient id="dieFace" cx="0.32" cy="0.28" r="0.95">
      <stop offset="0%"  stop-color="#fff3d6"/>
      <stop offset="38%" stop-color="#ffd28a"/>
      <stop offset="78%" stop-color="#f5a23a"/>
      <stop offset="100%" stop-color="#e07a14"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(245,166,35,0.55)"/>
      <stop offset="100%" stop-color="rgba(245,166,35,0)"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.45"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glow halo -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- Die shadow -->
  <ellipse cx="256" cy="450" rx="170" ry="22" fill="rgba(0,0,0,0.40)"/>

  <!-- Die body -->
  <g filter="url(#softShadow)">
    <rect x="92" y="76" width="328" height="328" rx="56"
          fill="url(#dieFace)"
          stroke="#5a2a08" stroke-width="6"/>
  </g>

  <!-- 6 pips, 2 cols x 3 rows -->
  <g fill="#3a1a05">
    <circle cx="170" cy="160" r="22"/>
    <circle cx="342" cy="160" r="22"/>
    <circle cx="170" cy="240" r="22"/>
    <circle cx="342" cy="240" r="22"/>
    <circle cx="170" cy="320" r="22"/>
    <circle cx="342" cy="320" r="22"/>
  </g>
</svg>
