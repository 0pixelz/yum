<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="YUM app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2a55"/>
      <stop offset="100%" stop-color="#0f1a3a"/>
    </linearGradient>
    <radialGradient id="dieFace" cx="0.32" cy="0.28" r="0.95">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="38%" stop-color="#ffd28a"/>
      <stop offset="78%" stop-color="#f5a23a"/>
      <stop offset="100%" stop-color="#e07a14"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="rgba(245,166,35,0.45)"/>
      <stop offset="100%" stop-color="rgba(245,166,35,0)"/>
    </radialGradient>
    <filter id="dieShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Soft glow halo behind die -->
  <circle cx="256" cy="256" r="210" fill="url(#halo)"/>

  <!-- Rounded-square die with 6 pips -->
  <g filter="url(#dieShadow)">
    <rect x="108" y="100" width="296" height="296" rx="56"
          fill="url(#dieFace)"
          stroke="#5a2a08" stroke-width="8"/>

    <!-- 6 pips arranged 2 columns x 3 rows -->
    <circle cx="186" cy="178" r="20" fill="#3a1a05"/>
    <circle cx="326" cy="178" r="20" fill="#3a1a05"/>
    <circle cx="186" cy="248" r="20" fill="#3a1a05"/>
    <circle cx="326" cy="248" r="20" fill="#3a1a05"/>
    <circle cx="186" cy="318" r="20" fill="#3a1a05"/>
    <circle cx="326" cy="318" r="20" fill="#3a1a05"/>
  </g>
</svg>
