name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "DEPLOYMENT.md"
      - "**/*.md"
      - ".github/workflows/deploy-firebase-rules.yml"
  workflow_dispatch:

concurrency:
  group: firebase-hosting-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_YUM_GAME: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YUM_GAME }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_YUM_GAME" ]; then
            echo "::error::Missing FIREBASE_SERVICE_ACCOUNT_YUM_GAME secret."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_YUM_GAME" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy to Hosting
        run: firebase deploy --only hosting --project yum-game --non-interactive
