# Wires the Apple Services ID into Firebase so Sign in with Apple works on
# the WEBSITE (the native iOS flow works without this). Run from the Actions
# tab AFTER creating the Services ID on developer.apple.com:
#
#   Identifiers → + → Services IDs → identifier "io.yamio.app.web"
#   → enable Sign In with Apple → Configure:
#        Primary App ID: io.yamio.app
#        Domains:        yum-game.firebaseapp.com
#        Return URLs:    https://yum-game.firebaseapp.com/__/auth/handler
#
# Idempotent — safe to re-run.
name: Firebase — Apple sign-in for web (Services ID)

on:
  workflow_dispatch:
    inputs:
      services_id:
        description: "Apple Services ID registered on developer.apple.com"
        required: true
        default: "io.yamio.app.web"
      key_id:
        description: "Key ID of the Sign in with Apple key (.p8 must be in the APPLE_SIGNIN_KEY_P8 secret)"
        required: false
        default: "R3FTH9262N"
  # Temporary: auto-run on this branch (the API token can't dispatch workflows).
  push:
    branches:
      - claude/yam-world-pvp-bot-mode-e6gljc
    paths:
      - .github/workflows/firebase-apple-web.yml


jobs:
  configure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YUM_GAME }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Show current Apple provider config
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          curl -sS -H "Authorization: Bearer $TOKEN" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/yum-game/defaultSupportedIdpConfigs/apple.com" \
            | python3 -c "import json,sys; c=json.load(sys.stdin); c.pop('clientSecret', None); print(json.dumps(c, indent=2))"

      - name: Set Services ID on the Apple provider
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          SERVICES_ID: ${{ inputs.services_id || 'io.yamio.app.web' }}
        run: |
          HTTP=$(curl -sS -o /tmp/idp.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\": \"$SERVICES_ID\"}" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/yum-game/defaultSupportedIdpConfigs/apple.com?updateMask=clientId")
          python3 -c "import json; c=json.load(open('/tmp/idp.json')); c.pop('clientSecret', None); print(json.dumps(c, indent=2))" || cat /tmp/idp.json
          if [ "$HTTP" -ge 300 ]; then
            echo "::error::Could not set the Services ID (HTTP $HTTP). Fallback: Firebase console → Authentication → Sign-in method → Apple → Services ID → $SERVICES_ID."
            exit 1
          fi
          echo "Apple provider Services ID set to $SERVICES_ID."

      - name: Enable Apple code flow (team ID + key)
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          KEY_ID: ${{ inputs.key_id || 'R3FTH9262N' }}
          P8: ${{ secrets.APPLE_SIGNIN_KEY_P8 }}
        run: |
          # Firebase web sign-in for Apple requires the OAuth code flow config
          # ("Code flow is not enabled for Apple" otherwise): Apple team ID,
          # the Sign in with Apple key ID, and the .p8 private key.
          if [ -z "$P8" ]; then
            echo "::error::Secret APPLE_SIGNIN_KEY_P8 is empty — add the .p8 key contents as a repository secret first."
            exit 1
          fi
          python3 - <<'EOF'
          import json, os, re, sys
          key_id = os.environ["KEY_ID"].strip()
          if not re.fullmatch(r"[A-Za-z0-9]{10}", key_id):
              sys.exit(f"key_id must be the 10-character Apple Key ID (like R3FTH9262N), not the key contents — got {len(key_id)} characters.")
          # Rebuild a canonical PEM no matter how the paste mangled it
          # (lost newlines, missing BEGIN/END markers, stray spaces).
          b64 = re.sub(r"-----(BEGIN|END)[A-Z ]*PRIVATE KEY-----", "", os.environ["P8"])
          b64 = re.sub(r"\s+", "", b64)
          if not re.fullmatch(r"[A-Za-z0-9+/=]+", b64) or len(b64) < 100:
              sys.exit("APPLE_SIGNIN_KEY_P8 secret doesn't look like a .p8 key — paste the whole file contents.")
          body = "\n".join(b64[i:i+64] for i in range(0, len(b64), 64))
          # No trailing newline: the API checks the string ends exactly with
          # the END marker.
          pem = f"-----BEGIN PRIVATE KEY-----\n{body}\n-----END PRIVATE KEY-----"
          payload = {"appleSignInConfig": {"codeFlowConfig": {
              "teamId": "SM5339KY75",
              "keyId": key_id,
              "privateKey": pem,
          }}}
          open('/tmp/codeflow.json', 'w').write(json.dumps(payload))
          EOF
          HTTP=$(curl -sS -o /tmp/cf.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/codeflow.json \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/yum-game/defaultSupportedIdpConfigs/apple.com?updateMask=appleSignInConfig.codeFlowConfig")
          python3 -c "import json; c=json.load(open('/tmp/cf.json')); c.pop('clientSecret', None); cfg=c.get('appleSignInConfig',{}).get('codeFlowConfig'); cfg and cfg.pop('privateKey', None); print(json.dumps(c, indent=2))" || cat /tmp/cf.json
          if [ "$HTTP" -ge 300 ]; then
            echo "::error::Could not set the Apple code flow config (HTTP $HTTP)."
            exit 1
          fi
          echo "Apple code flow enabled (team SM5339KY75, key $KEY_ID)."

      - name: Verify web sign-in is unblocked (createAuthUri)
        run: |
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d '{"providerId":"apple.com","continueUri":"https://yamio.io/__/auth/handler","oauthScope":"email name"}' \
            "https://identitytoolkit.googleapis.com/v1/accounts:createAuthUri?key=AIzaSyBl1XezlXttwyQLBsEJJV0nkxomzL0uhZw" \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'authUri' in d:
              print('OK — Apple web sign-in is live. authUri targets:', d['authUri'].split('?')[0])
          else:
              print(json.dumps(d, indent=2))
              raise SystemExit('createAuthUri still failing')"

      - name: Summary
        env:
          SERVICES_ID: ${{ inputs.services_id }}
        run: |
          {
            echo "### Apple web sign-in configured ✅"
            echo ""
            echo "- Firebase Apple provider Services ID → \`$SERVICES_ID\`"
            echo "- Native iOS sign-in is unaffected (it authenticates with the app's bundle ID)."
            echo ""
            echo "Test it: open https://yamio.io in a browser → Sign in with Apple."
            echo ""
            echo "If the Apple popup shows an **invalid_client** or redirect error, the Services ID on developer.apple.com is missing its web configuration — it must list domain \`yum-game.firebaseapp.com\` and return URL \`https://yum-game.firebaseapp.com/__/auth/handler\`."
          } >> "$GITHUB_STEP_SUMMARY"
