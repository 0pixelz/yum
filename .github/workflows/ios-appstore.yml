# Build the native iOS app on a cloud Mac and upload it to App Store Connect —
# no local Mac required. Trigger it from the GitHub Actions tab ("Run workflow").
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID     — App Store Connect API key ID (e.g. 2X9R4HXF34)
#   ASC_ISSUER_ID  — Issuer ID shown at the top of the API keys page
#   ASC_KEY_P8     — full contents of the downloaded AuthKey_<KEYID>.p8 file
#
# Signing is fully automatic ("cloud signing"): xcodebuild uses the API key to
# create/download the distribution certificate and provisioning profile, so no
# certificates ever need to be exported or stored. The uploaded build lands in
# App Store Connect (TestFlight → then attach it to the version and submit).
name: iOS — Build & Upload to App Store

on:
  workflow_dispatch:

concurrency:
  group: ios-appstore
  cancel-in-progress: false

jobs:
  build-and-upload:
    # macos-26 ships Xcode 26 (Apple requires the iOS 26 SDK for uploads).
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets into the iOS project
        run: |
          npm run build:www
          npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$ASC_KEY_P8" > "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Archive (ad-hoc signed, embeds entitlements)
        working-directory: ios/App
        run: |
          # Archive with AD-HOC signing ("-"): needs no certificate, profile
          # or registered device, but — unlike fully-unsigned builds — it DOES
          # embed App/App.entitlements into the binary. The export step's
          # App Store re-sign preserves those entitlements (Sign in with
          # Apple), which a fully-unsigned archive silently dropped, breaking
          # the Apple sign-in button with ASAuthorization error 1000.
          # (History: automatic signing needs a development profile → fails
          # with no registered devices; forcing Apple Distribution conflicts
          # with automatic signing. Manual + ad-hoc sidesteps all of it.)
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            archive

      - name: Export & upload to App Store Connect
        working-directory: ios/App
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Summary
        run: |
          echo "### iOS build uploaded 🎉" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version 2.0.0 (build ${{ github.run_number }}) is processing in App Store Connect." >> "$GITHUB_STEP_SUMMARY"
          echo "It appears under TestFlight in ~15–30 minutes, then you can attach it to the version and submit for review." >> "$GITHUB_STEP_SUMMARY"
