name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".github/workflows/deploy-firebase-functions.yml"
  workflow_dispatch:

concurrency:
  group: firebase-functions-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm ci || npm install

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_YUM_GAME: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YUM_GAME }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_YUM_GAME" ]; then
            echo "::error::Missing FIREBASE_SERVICE_ACCOUNT_YUM_GAME secret. The service account also needs 'Cloud Functions Admin' + 'Service Account User' + 'Firebase Admin' roles."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_YUM_GAME" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy functions
        run: firebase deploy --only functions --project yum-game --non-interactive --force
