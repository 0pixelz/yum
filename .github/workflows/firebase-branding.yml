# One-shot email-branding setup for Firebase Auth, run from the Actions tab.
# Uses the hosting-deploy service account (FIREBASE_SERVICE_ACCOUNT_YUM_GAME).
#
# What it does (idempotent — safe to re-run):
#   1. Prints the current auth email config (so the run log documents state).
#   2. Renames the project display name to "Yamio" (the default email text
#      derives its app name from the project — this removes "project-yum").
#   3. Makes sure yamio.io is on the Auth authorized-domains list (the console
#      rejects a custom action URL whose domain isn't authorized).
#   4. Sets the branded action URL https://yamio.io/auth-action.html
#      (callbackUri — not a template field, so likely API-writable).
#   5. Tries to set sender name "Yamio" + reply-to support@yamio.io on the
#      templates. NOTE: Google blocks template edits via API on standard
#      Firebase projects (EMAIL_TEMPLATE_UPDATE_NOT_ALLOWED) — when that
#      happens the run summary prints the exact console steps instead of
#      failing the run.
name: Firebase — Brand auth emails (Yamio)

on:
  workflow_dispatch:

jobs:
  brand:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YUM_GAME }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Show current email template config
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          curl -sS -H "Authorization: Bearer $TOKEN" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/yum-game/config" \
            | python3 -c "import json,sys; c=json.load(sys.stdin); print(json.dumps(c.get('notification', {}), indent=2))"

      - name: Rename project display name to Yamio
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          HTTP=$(curl -sS -o /tmp/name.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"displayName":"Yamio"}' \
            "https://firebase.googleapis.com/v1beta1/projects/yum-game?updateMask=displayName")
          cat /tmp/name.json
          if [ "$HTTP" -ge 300 ]; then
            echo "::warning::Project rename failed (HTTP $HTTP) — if emails still say 'project-yum', set the Public-facing name manually: Firebase console → Project settings → General → Public-facing name → 'Yamio'."
          else
            echo "Project display name set to Yamio."
          fi

      - name: Ensure yamio.io is an authorized domain
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          # The console refuses a custom action URL whose domain is not on the
          # Authorized domains list — make sure yamio.io is there.
          curl -sS -H "Authorization: Bearer $TOKEN" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/yum-game/config" \
            | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin).get('authorizedDomains', [])))" > /tmp/domains.json
          cat /tmp/domains.json
          python3 - <<'EOF'
          import json
          domains = json.load(open('/tmp/domains.json'))
          missing = [d for d in ('yamio.io', 'www.yamio.io') if d not in domains]
          json.dump({'authorizedDomains': domains + missing}, open('/tmp/domains_patch.json', 'w'))
          print('missing:', missing or 'none')
          open('/tmp/needs_patch', 'w').write('yes' if missing else 'no')
          EOF
          if [ "$(cat /tmp/needs_patch)" = "yes" ]; then
            HTTP=$(curl -sS -o /tmp/dom.json -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d @/tmp/domains_patch.json \
              "https://identitytoolkit.googleapis.com/admin/v2/projects/yum-game/config?updateMask=authorizedDomains")
            cat /tmp/dom.json
            if [ "$HTTP" -ge 300 ]; then
              echo "::warning::Could not add yamio.io to authorized domains (HTTP $HTTP) — add it manually: Authentication → Settings → Authorized domains → Add domain → yamio.io."
            else
              echo "Added yamio.io to authorized domains."
            fi
          else
            echo "yamio.io already authorized."
          fi

      - name: Try to set branded action URL (callbackUri)
        id: callback
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          # The API refused https://yamio.io/... (EMAIL_TEMPLATE_UPDATE_NOT_ALLOWED),
          # so try candidate URLs in preference order — the branded page is also
          # deployed on the project's own Hosting domains — and keep the first
          # one Google accepts.
          CANDIDATES=(
            "https://yamio.io/auth-action.html"
            "https://www.yamio.io/auth-action.html"
            "https://yum-game.web.app/auth-action.html"
            "https://yum-game.firebaseapp.com/auth-action.html"
          )
          RESULT="blocked"
          for URL in "${CANDIDATES[@]}"; do
            HTTP=$(curl -sS -o /tmp/cb.json -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"notification\":{\"sendEmail\":{\"callbackUri\":\"$URL\"}}}" \
              "https://identitytoolkit.googleapis.com/admin/v2/projects/yum-game/config?updateMask=notification.sendEmail.callbackUri")
            echo "--- $URL -> HTTP $HTTP"
            cat /tmp/cb.json
            if [ "$HTTP" -lt 300 ]; then
              RESULT="$URL"
              echo "Action URL set to $URL"
              break
            fi
          done
          echo "callback=$RESULT" >> "$GITHUB_OUTPUT"
          if [ "$RESULT" = "blocked" ]; then
            echo "::warning::Action URL update blocked via API for every candidate URL — set it in the console: Authentication → Templates → Customize action URL."
          fi

      - name: Try to set sender name and reply-to
        id: templates
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          MASK="notification.sendEmail.resetPasswordTemplate.senderDisplayName"
          MASK="$MASK,notification.sendEmail.resetPasswordTemplate.replyTo"
          MASK="$MASK,notification.sendEmail.verifyEmailTemplate.senderDisplayName"
          MASK="$MASK,notification.sendEmail.verifyEmailTemplate.replyTo"
          MASK="$MASK,notification.sendEmail.changeEmailTemplate.senderDisplayName"
          MASK="$MASK,notification.sendEmail.changeEmailTemplate.replyTo"
          HTTP=$(curl -sS -o /tmp/patch.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "notification": {
                "sendEmail": {
                  "resetPasswordTemplate": { "senderDisplayName": "Yamio", "replyTo": "support@yamio.io" },
                  "verifyEmailTemplate":   { "senderDisplayName": "Yamio", "replyTo": "support@yamio.io" },
                  "changeEmailTemplate":   { "senderDisplayName": "Yamio", "replyTo": "support@yamio.io" }
                }
              }
            }' \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/yum-game/config?updateMask=$MASK")
          cat /tmp/patch.json
          if [ "$HTTP" -ge 300 ]; then
            echo "templates=blocked" >> "$GITHUB_OUTPUT"
            echo "::warning::Google does not allow email-template edits via API on this project (HTTP $HTTP — EMAIL_TEMPLATE_UPDATE_NOT_ALLOWED). This is a Firebase policy, not a permissions issue. Set them in the console instead — see the run Summary for the exact clicks."
          else
            echo "templates=updated" >> "$GITHUB_OUTPUT"
            echo "Email templates updated."
          fi

      - name: Summary
        env:
          TEMPLATES: ${{ steps.templates.outputs.templates }}
          CALLBACK: ${{ steps.callback.outputs.callback }}
        run: |
          {
            echo "### Project renamed to Yamio ✅"
            echo ""
            if [ "$CALLBACK" != "blocked" ] && [ -n "$CALLBACK" ]; then
              echo "### Action URL → $CALLBACK ✅"
              echo ""
              echo "Email links now open the branded Yamio page — no console step needed for this."
            else
              echo "### Action URL: set in console ⚠️"
              echo ""
              echo "Authentication → Templates → **Customize action URL** → \`https://yamio.io/auth-action.html\`"
              echo "(yamio.io was just added to Authorized domains, so the save that failed before should work now)"
            fi
            echo ""
            if [ "$TEMPLATES" = "updated" ]; then
              echo "### Sender name + reply-to branded ✅"
              echo ""
              echo "- Sender name: Yamio · Reply-to: support@yamio.io"
            else
              echo "### Sender name + reply-to: 2 quick console steps ⚠️"
              echo ""
              echo "Google blocks these fields via API on standard Firebase projects, so finish in the console:"
              echo ""
              echo "1. Open **Firebase console → Authentication → Templates** (project *yum-game*)."
              echo "2. For **Password reset**, **Email address verification** and **Email address change**, tap the ✏️ pencil and set:"
              echo "   - Sender name: \`Yamio\`"
              echo "   - Reply to: \`support@yamio.io\`"
            fi
            echo ""
            echo "Then send yourself a fresh 'Forgot password' email — it should say **Yamio**, reply to support@yamio.io, and open the branded Yamio page."
          } >> "$GITHUB_STEP_SUMMARY"
